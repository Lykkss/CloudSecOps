name: CI — Test & Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cloudsecops-backend

jobs:
  # ── Job 1 : Tests unitaires ──────────────────────────────────────────────
  test:
    name: Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r app/backend/requirements-test.txt

      - name: Run tests
        working-directory: app/backend
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key-not-used-in-prod-32c
          APP_ENV: test
        run: pytest tests/ -v --tb=short

  # ── Job 2 : Build Docker + Trivy scan ────────────────────────────────────
  trivy-scan:
    name: Trivy — Container Scan
    runs-on: ubuntu-latest
    needs: test  # uniquement si les tests passent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f app/backend/Dockerfile \
            -t $IMAGE_NAME:${{ github.sha }} \
            app/

      - name: Run Trivy — vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Run Trivy — SARIF (upload GitHub Security tab)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # ── Job 3 : Lint IaC Terraform ───────────────────────────────────────────
  terraform-lint:
    name: Terraform — fmt & validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: terraform init (local backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate
