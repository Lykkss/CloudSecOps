<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', Arial, sans-serif; font-size: 11pt; color: #1a1a2e; line-height: 1.5; }

  @page {
    size: A4;
    margin: 20mm 18mm 20mm 18mm;
    @bottom-right {
      content: "Page " counter(page) " / " counter(pages);
      font-size: 9pt; color: #888;
    }
    @bottom-left {
      content: "CloudSecOps — CONFIDENTIEL";
      font-size: 9pt; color: #888;
    }
  }

  /* Header */
  .page-header { display: flex; justify-content: space-between; align-items: center;
    border-bottom: 3px solid #0f3460; padding-bottom: 10px; margin-bottom: 20px; }
  .logo-text { font-size: 18pt; font-weight: 700; color: #0f3460; }
  .logo-sub  { font-size: 8pt; color: #666; }
  .doc-ref   { text-align: right; font-size: 8pt; color: #666; }

  /* Typography */
  h1 { font-size: 18pt; color: #0f3460; margin-bottom: 6px; }
  h2 { font-size: 13pt; color: #16213e; border-left: 4px solid #0f3460;
       padding-left: 8px; margin: 20px 0 10px; }
  h3 { font-size: 11pt; color: #16213e; margin: 14px 0 6px; }
  p  { margin-bottom: 8px; }

  /* Meta box */
  .meta-box { background: #f0f4ff; border: 1px solid #c5d5ff;
              border-radius: 6px; padding: 12px; margin-bottom: 20px;
              display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
  .meta-box .k { font-size: 8pt; text-transform: uppercase; color: #555; letter-spacing: .05em; }
  .meta-box .v { font-weight: 600; font-size: 10pt; }

  /* Severity pills */
  .pill { display: inline-block; border-radius: 12px; padding: 2px 8px; font-size: 8pt; font-weight: 700; }
  .pill-critical { background: #ffeaea; color: #c0392b; }
  .pill-high     { background: #fff3e0; color: #d68910; }
  .pill-medium   { background: #fffde7; color: #b7950b; }
  .pill-low      { background: #e8f8e8; color: #1e8449; }
  .pill-info     { background: #e8f0fe; color: #1a73e8; }
  .pill-passed   { background: #e8f8e8; color: #1e8449; }
  .pill-failed   { background: #ffeaea; color: #c0392b; }
  .pill-open         { background: #ffeaea; color: #c0392b; }
  .pill-investigating{ background: #fff3e0; color: #d68910; }
  .pill-resolved     { background: #e8f8e8; color: #1e8449; }
  .pill-draft  { background: #f5f5f5; color: #666; }
  .pill-final  { background: #e8f0fe; color: #1a73e8; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 9.5pt; }
  th { background: #0f3460; color: #fff; padding: 6px 8px; text-align: left; font-size: 8.5pt; }
  td { padding: 5px 8px; border-bottom: 1px solid #e0e0e0; vertical-align: top; }
  tr:nth-child(even) td { background: #f9f9ff; }

  /* Attack path */
  .attack-step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .step-num { background: #0f3460; color: #fff; border-radius: 50%;
              width: 22px; height: 22px; display: flex; align-items: center;
              justify-content: center; font-size: 9pt; font-weight: 700; flex-shrink: 0; }
  .step-body .step-title { font-weight: 600; font-size: 10pt; }
  .step-body .step-tech  { font-size: 8.5pt; color: #666; }
  .step-body .step-mitre { font-size: 8pt; color: #1a73e8; font-family: monospace; }
  .step-arrow { text-align: center; color: #0f3460; font-size: 14pt; }

  /* Score gauge */
  .score-bar { background: #eee; border-radius: 4px; height: 12px; margin-top: 4px; }
  .score-fill { height: 12px; border-radius: 4px; }

  /* Warning box */
  .warning-box { background: #fff8e1; border-left: 4px solid #f9a825;
                 padding: 10px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 10pt; }
  .info-box { background: #e3f2fd; border-left: 4px solid #1565c0;
              padding: 10px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 10pt; }

  /* Page break */
  .page-break { page-break-before: always; }

  /* Risk matrix */
  .risk-matrix { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px;
                 margin: 10px 0; font-size: 8pt; text-align: center; }
  .rm-cell { padding: 4px; border-radius: 2px; }
  .rm-1 { background: #e8f8e8; } .rm-2 { background: #fff9c4; }
  .rm-3 { background: #ffe0b2; } .rm-4 { background: #fce4ec; }

  code { font-family: monospace; background: #f5f5f5; padding: 1px 4px; border-radius: 3px; font-size: 9pt; }
  pre  { background: #1a1a2e; color: #e0e0e0; padding: 10px; border-radius: 6px;
         font-size: 8.5pt; overflow-wrap: break-word; margin-bottom: 12px; }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
